[phases.setup]
nixPkgs = [
  "python312",
  "gcc",
  "glib",
  "pango",
  "cairo",
  "gdk-pixbuf",
  "libffi",
  "shared-mime-info",
  "wkhtmltopdf"
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "playwright install chromium"
]

[phases.start]
cmd = "gunicorn app:app --bind 0.0.0.0:$PORT"